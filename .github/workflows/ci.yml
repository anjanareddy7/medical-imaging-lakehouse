name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pip install poetry

      - name: Configure Poetry
        run: poetry config virtualenvs.create false

      - name: Install dependencies
        run: poetry install --no-root

      - name: Lint with ruff
        run: |
          pip install ruff
          ruff check . --exit-zero

      - name: Run unit tests (DICOM parsing, DQ checks)
        run: poetry run pytest tests/test_dicom_parser.py tests/test_dq_checks.py -v

      - name: Run API tests
        run: poetry run pytest tests/test_api.py -v

  build-api-image:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build FastAPI Docker image
        run: docker build -f api/Dockerfile -t pneumonia-api:ci .